name: Security Scan

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # Run weekly on Monday at 9am UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

jobs:
  osv-scan-scheduled:
    name: Dependency Vulnerability Scan
    if: ${{ github.event_name == 'push' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
    uses: "google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@v2.3.3"
    with:
      scan-args: |-
        -r
        --config=osv-scanner.toml
        ./

  osv-scan-pr:
    name: Dependency Vulnerability Scan (PR)
    if: ${{ github.event_name == 'pull_request' }}
    uses: "google/osv-scanner-action/.github/workflows/osv-scanner-reusable-pr.yml@v2.3.3"
    with:
      scan-args: |-
        -r
        --config=osv-scanner.toml
        ./


  secrets-scan:
    name: Secrets Detection
    environment:
      name: security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  summary:
    name: Security Summary
    runs-on: ubuntu-latest
    needs: [osv-scan-scheduled, osv-scan-pr, secrets-scan]
    if: always()
    steps:
      - name: Check results
        run: |
          echo "## Security Scan Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # One of the osv-scan jobs will be skipped depending on the event type
          OSV_RESULT="${{ needs.osv-scan-scheduled.result }}"
          if [ "$OSV_RESULT" == "skipped" ]; then
            OSV_RESULT="${{ needs.osv-scan-pr.result }}"
          fi

          if [ "$OSV_RESULT" == "success" ]; then
            echo "✅ OSV scan: Passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ OSV scan: Failed" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ needs.secrets-scan.result }}" == "success" ]; then
            echo "✅ Secrets scan: Passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Secrets scan: Failed" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Fail if any check failed
        if: |
          (needs.osv-scan-scheduled.result == 'failure') ||
          (needs.osv-scan-pr.result == 'failure') ||
          needs.secrets-scan.result == 'failure'
        run: exit 1