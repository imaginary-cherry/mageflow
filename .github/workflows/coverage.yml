name: coverage.yml
on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches:
      - main
  pull_request:  # TODO: remove before merging to main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  mageflow-unit-coverage:
    environment:
      name: coverage
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Install tox
        run: pip install tox

      - name: Run unit coverage with tox
        working-directory: libs/mageflow
        env:
          PYTHONHASHSEED: 0
        run: tox -e coverage-unit

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: mageflow-unit
          files: libs/mageflow/coverage-unit.xml

  mageflow-integration-coverage:
    environment:
      name: coverage
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Install tox
        run: pip install tox

      - name: Deploy Hatch Lite
        run: |
          docker compose -f libs/mageflow/tests/integration/hatchet/docker-compose.hatchet.yml up -d

      - name: Generate Env File
        env:
          SERVER_AUTH_COOKIE_INSECURE: "t"
        run: |
          sleep 10
          HATCHET_API_KEY=$(docker compose -f libs/mageflow/tests/integration/hatchet/docker-compose.hatchet.yml exec hatchet-lite /hatchet-admin token create --config /config --tenant-id 707d0855-80ab-4e1f-a156-f1c4546cbf52)
          echo "HATCHET_API_KEY=$HATCHET_API_KEY" >> $GITHUB_ENV
          echo "DYNACONF_hatchet__api_key=$HATCHET_API_KEY" >> $GITHUB_ENV
          echo "DYNACONF_hatchet__namespace=tests_for_mageflow" >> $GITHUB_ENV
          echo "DYNACONF_hatchet__tls_config__strategy=none" >> $GITHUB_ENV
          echo "DYNACONF_REDIS__URL=redis://localhost:6379/" >> $GITHUB_ENV
          echo "HATCHET_CLIENT_WORKER_HEALTHCHECK_ENABLED=True" >> $GITHUB_ENV

      - name: Run integration coverage with tox
        working-directory: libs/mageflow
        env:
          PYTHONHASHSEED: 0
        run: tox -e coverage-integration

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: mageflow-integration
          files: libs/mageflow/coverage-integration.xml

      - name: Clean up
        if: always()
        run: |
          docker compose -f libs/mageflow/tests/integration/hatchet/docker-compose.hatchet.yml down || true

  thirdmagic-coverage:
    environment:
      name: coverage
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Install dependencies
        working-directory: libs/third-magic
        run: |
          pip install --upgrade pip
          pip install ".[dev]"

      - name: Run coverage
        working-directory: libs/third-magic
        env:
          PYTHONHASHSEED: 0
        run: |
          coverage run --branch -m pytest tests/ --junitxml=junit.xml -o junit_family=legacy
          coverage report --show-missing
          coverage xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: thirdmagic
          files: libs/third-magic/coverage.xml
