name: Publish to PyPI

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches:
      - main

jobs:
  publish-thirdmagic:
    environment:
      name: publish-pip
    runs-on: ubuntu-22.04
    permissions:
      id-token: write  # Required for trusted publishing
      contents: write  # Required for pushing tags

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"

    - name: Install build tools
      run: pip install build

    - name: Build thirdmagic
      run: python -m build
      working-directory: libs/third-magic

    - name: Publish thirdmagic to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        packages-dir: libs/third-magic/dist/
        skip-existing: true

  publish-mageflow:
    needs: publish-thirdmagic
    environment:
      name: publish-pip
    runs-on: ubuntu-22.04
    permissions:
      id-token: write
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"

    - name: Install build tools
      run: pip install build

    - name: Build mageflow
      run: python -m build
      working-directory: libs/mageflow

    - name: Publish mageflow to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        packages-dir: libs/mageflow/dist/
        skip-existing: true

    - name: Extract version and create tag
      id: version
      run: |
        VERSION=$(grep '^version = ' libs/mageflow/pyproject.toml | sed 's/version = "\(.*\)"/\1/')
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "Extracted version: $VERSION"

        if git rev-parse "v$VERSION" >/dev/null 2>&1; then
          echo "Tag v$VERSION already exists, skipping tag creation"
        else
          git config user.name github-actions
          git config user.email github-actions@github.com
          git tag -a "v$VERSION" -m "Release v$VERSION"
          git push origin "v$VERSION"
          echo "Created and pushed tag v$VERSION"
        fi

  publish-mageflow-mcp:
    needs: publish-thirdmagic
    environment:
      name: publish-pip
    runs-on: ubuntu-22.04
    permissions:
      id-token: write
      contents: read

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"

    - name: Install build tools
      run: pip install build

    - name: Build mageflow-mcp
      run: python -m build
      working-directory: libs/mageflow-mcp

    - name: Publish mageflow-mcp to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        packages-dir: libs/mageflow-mcp/dist/
        skip-existing: true
