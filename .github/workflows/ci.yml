name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: pip install ruff black

      - name: Check import sorting
        run: ruff check --select I .

      - name: Check formatting
        run: black --check .

  validate-branch-target:
    runs-on: ubuntu-22.04

    steps:
      - name: Validate PR target branch
        if: github.event_name == 'pull_request'
        run: |
          SOURCE_BRANCH="${{ github.head_ref }}"
          TARGET_BRANCH="${{ github.base_ref }}"

          echo "Source branch: $SOURCE_BRANCH"
          echo "Target branch: $TARGET_BRANCH"

          # Rule 1: Only develop branch can merge to main
          if [[ "$TARGET_BRANCH" == "main" && "$SOURCE_BRANCH" != "develop" ]]; then
            echo "❌ Error: Only 'develop' branch can merge to 'main'"
            echo "Your branch '$SOURCE_BRANCH' cannot target 'main' directly"
            echo "Please target 'develop' branch instead"
            exit 1
          fi

          echo "✅ Branch targeting rules validated successfully"

  thirdmagic-tests:
    name: Unit Tests (Thirdmagic)
    runs-on: ubuntu-latest
    needs: [validate-branch-target]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        working-directory: libs/third-magic
        run: |
          pip install --upgrade pip
          pip install ".[dev]"

      - name: Run Unit Tests
        working-directory: libs/third-magic
        run: pytest tests/unit

  mageflow-mcp-unit-tests:
    name: Unit Tests (Mageflow MCP)
    runs-on: ubuntu-latest
    needs: [validate-branch-target]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install ./libs/third-magic
          pip install "./libs/mageflow-mcp[dev,hatchet]"

      - name: Run Unit Tests
        working-directory: libs/mageflow-mcp
        run: pytest tests/unit

  mageflow-mcp-integration-tests:
    name: Integration Tests (Mageflow MCP)
    runs-on: ubuntu-latest
    needs: [validate-branch-target]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install ./libs/third-magic
          pip install ./libs/mageflow
          pip install "./libs/mageflow-mcp[dev,hatchet,integration]"

      - name: Deploy Hatchet Lite
        run: docker compose -f libs/mageflow/tests/integration/hatchet/docker-compose.hatchet.yml up -d

      - name: Generate Env File
        env:
          SERVER_AUTH_COOKIE_INSECURE: "t"
        run: |
          sleep 10
          HATCHET_API_KEY=$(docker compose -f libs/mageflow/tests/integration/hatchet/docker-compose.hatchet.yml exec hatchet-lite /hatchet-admin token create --config /config --tenant-id 707d0855-80ab-4e1f-a156-f1c4546cbf52)
          echo "HATCHET_API_KEY=$HATCHET_API_KEY" >> $GITHUB_ENV
          echo "HATCHET_CLIENT_TOKEN=$HATCHET_API_KEY" >> $GITHUB_ENV
          echo "DYNACONF_hatchet__api_key=$HATCHET_API_KEY" >> $GITHUB_ENV
          echo "DYNACONF_hatchet__namespace=tests_for_mageflow_mcp" >> $GITHUB_ENV
          echo "DYNACONF_hatchet__tls_config__strategy=none" >> $GITHUB_ENV
          echo "DYNACONF_REDIS__URL=redis://localhost:6379/" >> $GITHUB_ENV
          echo "HATCHET_CLIENT_WORKER_HEALTHCHECK_ENABLED=True" >> $GITHUB_ENV

      - name: Run Integration Tests
        working-directory: libs/mageflow-mcp
        run: pytest tests/integration

      - name: Clean up
        if: always()
        run: docker compose -f libs/mageflow/tests/integration/hatchet/docker-compose.hatchet.yml down

  unit-tests:
    name: Unit Tests (Mageflow)
    runs-on: ubuntu-latest
    needs: [validate-branch-target]

    strategy:
      matrix:
        python-version: ['3.11', '3.12', '3.13']
        hatchet-version: ['1.20', '1.21', '1.22', '1.23']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        working-directory: libs/mageflow
        run: |
          pip install --upgrade pip
          pip install tox

      - name: Run Unit Tests
        working-directory: libs/mageflow
        env:
          PYTHONHASHSEED: 0
        run: |
          PYTHON_VER=$(echo "${{ matrix.python-version }}" | tr -d '.')
          HATCHET_VER=$(echo "${{ matrix.hatchet-version }}" | tr -d '.')
          tox -e py${PYTHON_VER}-hatchet${HATCHET_VER}

  integration-tests:
    name: Integration Tests (Mageflow)
    runs-on: ubuntu-latest
    needs: [validate-branch-target]

    strategy:
      matrix:
        python-version: ['3.11', '3.12', '3.13']
        hatchet-version: ['1.22', '1.23']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        working-directory: libs/mageflow
        run: |
          pip install --upgrade pip
          pip install tox

      - name: Deploy Hatchet Lite
        run: docker compose -f libs/mageflow/tests/integration/hatchet/docker-compose.hatchet.yml up -d

      - name: Generate Env File
        env:
          SERVER_AUTH_COOKIE_INSECURE: "t"
        run: |
          sleep 10
          HATCHET_API_KEY=$(docker compose -f libs/mageflow/tests/integration/hatchet/docker-compose.hatchet.yml exec hatchet-lite /hatchet-admin token create --config /config --tenant-id 707d0855-80ab-4e1f-a156-f1c4546cbf52)
          echo "HATCHET_API_KEY=$HATCHET_API_KEY" >> $GITHUB_ENV
          echo "DYNACONF_hatchet__api_key=$HATCHET_API_KEY" >> $GITHUB_ENV
          echo "DYNACONF_hatchet__namespace=tests_for_mageflow" >> $GITHUB_ENV
          echo "DYNACONF_hatchet__tls_config__strategy=none" >> $GITHUB_ENV
          echo "DYNACONF_REDIS__URL=redis://localhost:6379/" >> $GITHUB_ENV
          echo "HATCHET_CLIENT_WORKER_HEALTHCHECK_ENABLED=True" >> $GITHUB_ENV

      - name: Run Integration Tests
        working-directory: libs/mageflow
        env:
          PYTHONHASHSEED: 0
        run: |
          PYTHON_VER=$(echo "${{ matrix.python-version }}" | tr -d '.')
          HATCHET_VER=$(echo "${{ matrix.hatchet-version }}" | tr -d '.')
          tox -e integration-py${PYTHON_VER}-hatchet${HATCHET_VER}

      - name: Clean up
        if: always()
        run: docker compose -f libs/mageflow/tests/integration/hatchet/docker-compose.hatchet.yml down

  mage-voyance-tests:
    name: Integration Tests (Mage Voyance)
    runs-on: ubuntu-latest
    needs: [validate-branch-target]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install ./libs/third-magic
          pip install "./libs/mage-voyance[dev]"
          pip install testcontainers httpx

      - name: Run Integration Tests
        working-directory: libs/mage-voyance
        run: pytest integration/frontend -v

  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    needs: [validate-branch-target]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install ./libs/third-magic
          pip install ./libs/mage-voyance
          pip install testcontainers click

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run unit tests
        working-directory: frontend
        run: npx vitest run --project unit

      - name: Run integration tests
        working-directory: frontend
        run: npx vitest run --project integration

      - name: Run component integration tests
        working-directory: frontend
        run: npx vitest run --project component-integration

  rust-tests:
    name: Rust Tests (Tauri)
    runs-on: ubuntu-latest
    needs: [validate-branch-target]

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            frontend/src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('frontend/src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Run Rust tests
        working-directory: frontend/src-tauri
        run: cargo test

  e2e-tests:
    name: E2E Tests (${{ matrix.backend }})
    runs-on: ubuntu-latest
    needs: [validate-branch-target]

    strategy:
      fail-fast: false
      matrix:
        backend: ['fakeredis', 'testcontainers']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        working-directory: libs/mageflow-e2e
        run: |
          pip install --upgrade pip
          pip install tox

      - name: Run E2E Tests
        working-directory: libs/mageflow-e2e
        run: tox -e e2e-${{ matrix.backend }}

  test-results:
    runs-on: ubuntu-22.04
    needs: [lint, thirdmagic-tests, mageflow-mcp-unit-tests, mageflow-mcp-integration-tests, unit-tests, integration-tests, e2e-tests, mage-voyance-tests, frontend-tests, rust-tests]
    if: always()
    steps:
      - name: Check test results
        run: |
          if [[ "${{ needs.lint.result }}" != "success" ]]; then
            echo "Lint job failed"
            exit 1
          fi
          if [[ "${{ needs.thirdmagic-tests.result }}" != "success" ]]; then
            echo "Thirdmagic test job failed"
            exit 1
          fi
          if [[ "${{ needs.mageflow-mcp-unit-tests.result }}" != "success" ]]; then
            echo "Mageflow MCP unit test job failed"
            exit 1
          fi
          if [[ "${{ needs.mageflow-mcp-integration-tests.result }}" != "success" ]]; then
            echo "Mageflow MCP integration test job failed"
            exit 1
          fi
          if [[ "${{ needs.unit-tests.result }}" != "success" ]]; then
            echo "Unit test job failed"
            exit 1
          fi
          if [[ "${{ needs.integration-tests.result }}" != "success" ]]; then
            echo "Integration test job failed"
            exit 1
          fi
          if [[ "${{ needs.e2e-tests.result }}" != "success" ]]; then
            echo "E2E test job failed"
            exit 1
          fi
          if [[ "${{ needs.mage-voyance-tests.result }}" != "success" ]]; then
            echo "Mage Voyance test job failed"
            exit 1
          fi
          if [[ "${{ needs.frontend-tests.result }}" != "success" ]]; then
            echo "Frontend test job failed"
            exit 1
          fi
          if [[ "${{ needs.rust-tests.result }}" != "success" ]]; then
            echo "Rust test job failed"
            exit 1
          fi
          echo "All checks passed successfully!"
