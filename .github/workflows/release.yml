name: New Release

on:
  workflow_run:
    workflows: ["Publish to PyPI"]
    types:
      - completed

jobs:
  create-github-release:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-22.04
    permissions:
      contents: write  # Required for creating releases
    
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Required to fetch all tags

    - name: Extract version from mageflow pyproject.toml
      id: version
      run: |
        # Use mageflow's pyproject.toml as the source of truth for the release version,
        # rather than picking the latest v* tag (which may include non-release milestone tags like v1.0).
        VERSION=$(grep -m1 '^version' libs/mageflow/pyproject.toml | sed 's/version = "\(.*\)"/\1/')
        if [ -z "$VERSION" ]; then
          echo "Error: Could not extract version from libs/mageflow/pyproject.toml"
          exit 1
        fi

        # Verify a matching git tag exists for this version
        TAG="v$VERSION"
        if ! git tag -l "$TAG" | grep -q "$TAG"; then
          echo "Error: Tag $TAG not found"
          exit 1
        fi
        RELEASE_DATE=$(date +%Y-%m-%d)
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "tag=$TAG" >> $GITHUB_OUTPUT
        echo "release_date=$RELEASE_DATE" >> $GITHUB_OUTPUT
        echo "Version from pyproject.toml: $VERSION"
        echo "Matching tag: $TAG"
        echo "Release date: $RELEASE_DATE"

    - name: Extract release notes
      id: release_notes
      run: |
        VERSION=${{ steps.version.outputs.version }}
        
        # Check if changelog exists
        if [ ! -f "CHANGELOG.md" ]; then
          echo "Error: CHANGELOG.md not found"
          exit 1
        fi
        
        # Extract release notes for this version
        RELEASE_NOTES=$(awk "/^## \[$VERSION\]/{flag=1; next} /^## \[/{flag=0} flag" CHANGELOG.md)
        
        # Check if release notes were found
        if [ -z "$RELEASE_NOTES" ]; then
          echo "Error: No release notes found for version $VERSION in CHANGELOG.md"
          echo "Please add release notes for version $VERSION before creating a release"
          exit 1
        fi
        
        # Save release notes to file and output
        echo "$RELEASE_NOTES" > release_notes.md
        echo "Release notes extracted for version $VERSION"
        
        # Create multiline output
        {
          echo 'notes<<EOF'
          echo "$RELEASE_NOTES"
          echo EOF
        } >> $GITHUB_OUTPUT
    
    - name: Create GitHub Release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ steps.version.outputs.tag }}
        release_name: ${{ steps.version.outputs.version }} - ${{ steps.version.outputs.release_date }}
        body: ${{ steps.release_notes.outputs.notes }}
        draft: false
        prerelease: false
