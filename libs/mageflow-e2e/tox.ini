[tox]
envlist =
    e2e-fakeredis
    e2e-testcontainers
isolated_build = true

[testenv:e2e-fakeredis]
usedevelop = true
deps =
    ../third-magic
    ../mageflow[hatchet,testing]
setenv =
    MAGEFLOW_TESTING_BACKEND = fakeredis
commands =
    pytest tests/ -v

[testenv:e2e-testcontainers]
usedevelop = true
deps =
    ../third-magic
    ../mageflow[hatchet,testing]
setenv =
    MAGEFLOW_TESTING_BACKEND = testcontainers
commands =
    pytest tests/ -v
