[tox]
envlist =
    e2e-fakeredis
    e2e-testcontainers
isolated_build = true

[testenv:e2e-fakeredis]
usedevelop = true
deps =
    ../third-magic
    ../mageflow[hatchet,testing]
commands =
    pytest tests/ -v

[testenv:e2e-testcontainers]
usedevelop = true
deps =
    ../third-magic
    ../mageflow[hatchet,testing]
allowlist_externals =
    cp
    mv
commands_pre =
    cp pyproject.toml pyproject.toml.bak
    cp pyproject.testcontainers.toml pyproject.toml
commands =
    pytest tests/ -v
commands_post =
    mv pyproject.toml.bak pyproject.toml
