# This file exists only so uv recognizes the repo root.
# Each package under libs/ manages its own dependencies independently.

[tool.uv.workspace]
members = ["libs/mageflow", "libs/third-magic", "libs/mageflow-mcp"]

[tool.ruff]
target-version = "py310"

[tool.ruff.lint]
select = ["I"]

[tool.ruff.lint.isort]
known-first-party = ["mageflow", "mageflow_mcp", "thirdmagic"]
